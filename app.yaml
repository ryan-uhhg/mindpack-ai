name: mindpack-ai
region: singapore
build_command: npm install && npm run build
run_command: npm start
github:
  branch: main
  deploy_on_push: true
envVars:
  - key: NODE_ENV
    value: production
  - key: PORT
    value: "3000"
  - key: EMAILOCTOPUS_API_KEY
    sync: false
  - key: FRONTEND_URL
    value: https://mindpack-ilxkl.ondigitalocean.app
http_port: "3000"
health_check_path: /api/health