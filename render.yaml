services:
  - type: web
    name: mindpack-ai
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: EMAILOCTOPUS_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://mindpackai.onrender.com
